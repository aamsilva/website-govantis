<!DOCTYPE html>

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --accent: #2dd4bf; --accent2: #3b82f6; --text: #f8fafc; --text2: #94a3b8; }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; -webkit-font-smoothing: antialiased; overflow: hidden; position: relative; }
        body::before { content: ''; position: fixed; top: -30%; right: -20%; width: 800px; height: 800px; background: radial-gradient(circle, rgba(45,212,191,0.04) 0%, transparent 60%); pointer-events: none; }
        body::after { content: ''; position: fixed; bottom: -20%; left: -10%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(59,130,246,0.04) 0%, transparent 60%); pointer-events: none; }
        .container { text-align: center; padding: 2rem; max-width: 550px; position: relative; z-index: 1; }
        .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 3rem; }
        .logo-mark { position: relative; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .logo-mark .outer { position: absolute; inset: 0; background: var(--accent); border-radius: 7px; transform: rotate(45deg); opacity: 0.18; }
        .logo-mark .inner { width: 18px; height: 18px; border: 2px solid var(--accent); border-radius: 3px; }
        .logo-text { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.01em; }
        .code { font-size: 6rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1; margin-bottom: 1rem; background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; color: transparent; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; letter-spacing: -0.02em; }
        p { color: var(--text2); font-size: 1rem; margin-bottom: 2rem; line-height: 1.7; }
        .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .links a { padding: 12px 24px; font-weight: 600; font-size: 0.9rem; border-radius: 8px; text-decoration: none; transition: all 0.3s ease; }
        .links a.primary { background: linear-gradient(135deg, var(--accent) 0%, #14b8a6 100%); color: var(--bg); }
        .links a.primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(45,212,191,0.25); }
        .links a.outline { border: 1px solid rgba(255,255,255,0.12); color: var(--text); }
        .links a.outline:hover { border-color: var(--accent); color: var(--accent); }
        .metadata { margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.06); color: rgba(148,163,184,0.5); font-size: 0.75rem; }
        .metadata a { color: var(--accent); text-decoration: none; opacity: 0.7; }
        .metadata a:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">

    </div>
</body>
</html>
